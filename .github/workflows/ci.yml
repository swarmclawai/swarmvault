name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  packaged-smoke:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:preflight -- --skip-check --skip-test --skip-web --skip-skill --no-browser --no-oss-corpus

      - name: Upload packaged smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: packaged-smoke-artifacts
          path: |
            .live-smoke-artifacts/
            .oss-corpus-artifacts/
          if-no-files-found: ignore
